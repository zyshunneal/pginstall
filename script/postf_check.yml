#!/usr/bin/ansible-playbook
---
- name: 七、开始环境的后置检查工作
  hosts: all
  gather_facts: false
  serial: 20
  become: yes
  any_errors_fatal: true
  become_method: sudo
  vars:
    RESULT: "Database cluster initialization completed"
    business_user_password: "{{ lookup('env', 'PGINSTALL_BUSINESS_USER_PASSWORD') }}"
    business_username: "dbuser_{{ servername | replace('-', '') }}"
  tasks:
    - name: 校验后置检查所需环境变量
      assert:
        that:
          - business_user_password | length > 0
        fail_msg: 缺少后置检查所需环境变量，请设置 PGINSTALL_BUSINESS_USER_PASSWORD
      when: inventory_hostname == groups["master"][0]
      no_log: true

    - name: postgres 实例存活 CHECK
      shell: "ps aux | grep -v grep | grep 'postgres -D'  && exit 0 || exit 1"

    - name: postgres 核心进程 CHECK
      shell: "ps -ef | grep -v grep | grep  -E 'stats collector'\\|'postgres: checkpointer'\\|'postgres: logger'\\|'postgres: background writer' | wc -l"
      register: process_check_result

    - name: 判断核心进程 CHECK 结果
      debug: msg="postgres 核心进程 CHECK PASS"
      when: process_check_result.stdout == '4'

    - name: pgbouncer 实例存活 CHECK
      shell: ps -ef | grep 'pgbouncer.ini' | grep -v grep  && exit 0 || exit 1

    - name: 注册业务用户和密码
      set_fact:
          username: "{{ business_username }}"
          password: "{{ business_user_password }}"
      when: inventory_hostname == groups["master"][0]
      no_log: true

    - name: 主库验证用户连通性
      shell: PGPASSWORD='{{ password }}' psql -U {{ username }} -p 6432 -h 127.0.0.1  -d putong-{{ servername }}   -AXtqc "select 'master instance install success ,check OK'"
      register: check_connresult
      when: inventory_hostname == groups["master"][0]
      no_log: true

    - name: 主库验证用户连通性结果
      debug: msg="主库连通性CHECK PASS"
      when: inventory_hostname == groups["master"][0]

    - name: 业务用户write权限TEST
      shell: PGPASSWORD='{{ password }}' psql -U {{ username }} -p 6432 -h 127.0.0.1  -d putong-{{ servername }}   -AXtqc "insert into init_result_check_table(check_result) values('ok')"
      when: inventory_hostname == groups["master"][0]
      no_log: true

    - name: 业务用户read权限TEST
      shell: PGPASSWORD='{{ password }}' psql -U {{ username }} -p 6432 -h 127.0.0.1  -d putong-{{ servername }}   -AXtqc "select check_result from init_result_check_table"
      when: inventory_hostname == groups["master"][0]
      register: check_queryresult
      no_log: true

    - name: 业务用户read权限TEST
      shell: PGPASSWORD='{{ password }}' psql -U {{ username }} -p 6432 -h 127.0.0.1  -d putong-{{ servername }}   -AXtqc "select check_result from init_result_check_table"
      when: inventory_hostname == groups["master"][0]
      register: check_queryresult
      no_log: true

    - name: 业务用户read权限测试结果
      debug: msg="业务用户read权限测试结果PASS {{ check_queryresult.stdout }}"
      when: inventory_hostname == groups["master"][0]

    - name: 检查主从复制情况
      become: yes
      become_method: sudo
      become_user: postgres
      shell:  psql -AXtqc 'select count(*) as repstat    from pg_stat_wal_receiver'
      register: repli_result
      when: inventory_hostname != groups["master"][0]

    - name: 主从复制CHECK结果
      debug: msg="集群主从复制状况情况OK"
      when: inventory_hostname != groups["master"][0] and repli_result.stdout|int == 1

    - name: 数据库集群初始化完成
      debug: msg="{{ RESULT }}"
