#!/usr/bin/ansible-playbook
---
- name: 一、自动化安装Postgresql前置检查
  hosts: all
  gather_facts: false
  serial: 10
  any_errors_fatal: true
  become: yes
  become_method: sudo
  tasks:
    - name: 连通性测试，如果机器无法远程连接，那么所有操作都不可进行，此为第一前提条件
      action: ping

    - name: check机器上是否有非 /pg/data 的 postgres 进程，有则退出；/pg/data 的实例允许幂等重跑
      shell: |
        conflicts=$(ps -eo args | awk '/[p]ostgres .*-D / {
          for (i=1; i<=NF; i++) if ($i=="-D") { d=$(i+1); break }
          if (d != "/pg/data") print
        }')
        if [ -n "$conflicts" ]; then
          echo "conflict postgres instance(s):"
          echo "$conflicts"
          exit 1
        fi
        exit 0
      args:
        executable: /bin/bash
      changed_when: false

    - name: 确认指定的主机文件中有并只有一个主库,否则退出，集群构建过程中只能有一个主库，否则无法确认拓扑结构
      shell: "echo 'master greater then 1, list: {{ groups.master }}' && exit 1"
      when: groups.master|length != 1
